name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yauz.exe
            asset_name: yauz-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: yauz
            asset_name: yauz-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Generate macOS icon from ICO
        if: matrix.os == 'macos-latest'
        run: |
          brew install imagemagick
          magick src-tauri/icons/icon.ico -resize 512x512 src-tauri/icons/icon.png

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp "src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${{ matrix.asset_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
